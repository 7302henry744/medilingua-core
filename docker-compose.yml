services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medilingua-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Mount source for hot-reloading
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medilingua-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Mount source for hot-reloading
      - ./frontend/src:/app/src
      - /app/node_modules # Prevent host node_modules from overwriting container
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend