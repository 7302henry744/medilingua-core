name: MediLingua Compliance Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Permissions needed to push Docker images to GHCR
permissions:
  contents: read
  packages: write

jobs:
  # ==============================================================================
  # JOB 1: Continuous Integration (Quality Gate)
  # ==============================================================================
  compliance_check:
    name: Compliance & Testing
    runs-on: ubuntu-latest
    
    services: {}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Make
        run: sudo apt-get install -y make

      - name: Configure Environment
        # Create .env from example, just like 'make setup'
        run: cp .env.example .env

      - name: Build Stack
        # Validates that Dockerfiles compile correctly
        run: make build

      - name: Start Services
        # spins up the containers in detached mode
        run: make up

      - name: Wait for Health Checks
        # Critical: Give containers moments to initialize (DBs, Web servers)
        run: |
          echo "Waiting for services to stabilize..."
          sleep 10
          docker ps -a

      - name: Run Backend Tests
        # Executes the exact command you fixed: inside the container
        run: make test-backend

      - name: Run Frontend Tests
        # Executes the exact command you fixed: inside the container
        run: make test-frontend

      - name: Teardown
        if: always()
        run: make down

  # ==============================================================================
  # JOB 2: Continuous Delivery (Artifact Generation)
  # ==============================================================================
  delivery:
    name: Build & Push Artifacts
    needs: compliance_check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BACKEND BUILD
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medilingua-backend:latest
            ghcr.io/${{ github.repository_owner }}/medilingua-backend:${{ github.sha }}

      # FRONTEND BUILD
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medilingua-frontend:latest
            ghcr.io/${{ github.repository_owner }}/medilingua-frontend:${{ github.sha }}